[project]
name = "qmri-pipelines"
version = "0.1.0"
description = "End-to-end quantitative MRI processing pipelines built on qmri"
requires-python = ">=3.10"
readme = "README.md"
license = "MIT"
authors = [{ name = "Gold Standard Phantoms", email = "tom.hampshire@goldstandardphantoms.com" }]
keywords = ["mri", "qmri", "pipelines", "thermometry", "neuroimaging"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]

dependencies = [
    "qmri>=0.1.0",
    "qmri-io>=0.1.0",
    "numpy>=1.24",
]

[project.urls]
Homepage = "https://github.com/gold-standard-phantoms/qmri"
Documentation = "https://qmri.readthedocs.io"
Repository = "https://github.com/gold-standard-phantoms/qmri"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qmri"]

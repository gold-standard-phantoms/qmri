[project]
name = "qmri-cli"
version = "0.1.0"
description = "Command-line interface for qmri quantitative MRI analysis"
requires-python = ">=3.10"
readme = "README.md"
license = "MIT"
authors = [{ name = "Gold Standard Phantoms", email = "tom.hampshire@goldstandardphantoms.com" }]
keywords = ["mri", "qmri", "cli", "command-line"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Environment :: Console",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Typing :: Typed",
]

dependencies = [
    "qmri>=0.1.0",
    "qmri-io>=0.1.0",
    "qmri-pipelines>=0.1.0",
    "click>=8.1",
    "rich>=13.0",
]

[project.scripts]
qmri = "qmri.cli.main:cli"

[project.urls]
Homepage = "https://github.com/gold-standard-phantoms/qmri"
Documentation = "https://qmri.readthedocs.io"
Repository = "https://github.com/gold-standard-phantoms/qmri"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qmri"]

[project]
name = "qmri-viz"
dynamic = ["version"]
description = "Visualisation utilities for qmri quantitative MRI analysis"
requires-python = ">=3.10"
readme = "README.md"
license = "MIT"
authors = [{ name = "Gold Standard Phantoms", email = "tom.hampshire@goldstandardphantoms.com" }]
keywords = ["mri", "qmri", "visualisation", "plotting", "matplotlib"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Topic :: Scientific/Engineering :: Visualization",
    "Typing :: Typed",
]

dependencies = [
    "qmri>=0.1.0",
    "matplotlib>=3.7",
]

[project.urls]
Homepage = "https://github.com/gold-standard-phantoms/qmri"
Documentation = "https://qmri.readthedocs.io"
Repository = "https://github.com/gold-standard-phantoms/qmri"

[build-system]
requires = ["setuptools>=64", "setuptools_scm>=8", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["qmri*"]
namespaces = true

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.setuptools_scm]
root = "../.."
local_scheme = "no-local-version"
fallback_version = "0.0.0"

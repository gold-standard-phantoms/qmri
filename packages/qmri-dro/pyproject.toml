[project]
name = "qmri-dro"
dynamic = ["version"]
description = "Digital Reference Objects for quantitative MRI validation"
requires-python = ">=3.10"
readme = "README.md"
license = "MIT"
authors = [{ name = "Gold Standard Phantoms", email = "tom.hampshire@goldstandardphantoms.com" }]
keywords = [
    "mri",
    "qmri",
    "quantitative-mri",
    "digital-reference-object",
    "dro",
    "phantom",
    "simulation",
    "validation",
    "diffusion",
    "relaxometry",
    "perfusion",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Topic :: Scientific/Engineering :: Physics",
    "Typing :: Typed",
]

dependencies = [
    "qmri>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/gold-standard-phantoms/qmri"
Documentation = "https://gold-standard-phantoms.github.io/qmri"
Repository = "https://github.com/gold-standard-phantoms/qmri"
Changelog = "https://github.com/gold-standard-phantoms/qmri/blob/main/CHANGELOG.md"

[build-system]
requires = ["setuptools>=64", "setuptools_scm>=8", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["qmri*"]
namespaces = true

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.setuptools_scm]
root = "../.."
local_scheme = "no-local-version"
fallback_version = "0.0.0"

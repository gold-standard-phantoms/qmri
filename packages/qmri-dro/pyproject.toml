[project]
name = "qmri-dro"
version = "0.1.0"
description = "Digital Reference Objects for quantitative MRI validation"
requires-python = ">=3.10"
readme = "README.md"
license = "MIT"
authors = [{ name = "Gold Standard Phantoms", email = "tom.hampshire@goldstandardphantoms.com" }]
keywords = [
    "mri",
    "qmri",
    "quantitative-mri",
    "digital-reference-object",
    "dro",
    "phantom",
    "simulation",
    "validation",
    "diffusion",
    "relaxometry",
    "perfusion",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Topic :: Scientific/Engineering :: Physics",
    "Typing :: Typed",
]

dependencies = [
    "qmri>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/gold-standard-phantoms/qmri"
Documentation = "https://gold-standard-phantoms.github.io/qmri"
Repository = "https://github.com/gold-standard-phantoms/qmri"
Changelog = "https://github.com/gold-standard-phantoms/qmri/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/qmri"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/README.md",
]
